name: Add env secret on server

on:
  workflow_dispatch:

jobs:
  add-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Add RECAPTCHA_SECRET_KEY to server .env and restart backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/homepilot

            # Remove old value if present, then append fresh
            sed -i '/^RECAPTCHA_SECRET_KEY=/d' .env
            echo 'RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }}' >> .env

            # Restart only backend (no downtime for frontend)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            echo "Done. Backend restarting…"
