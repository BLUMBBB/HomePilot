name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check backend/

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: homepilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/homepilot_test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/homepilot_test
      SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v

  frontend-lint-build:
    name: Frontend — Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (includes tsc type-check)
        run: npm run build

  deploy:
    name: Deploy — Production server
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/homepilot}"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Repo not found at $DEPLOY_PATH, cloning..."
              sudo mkdir -p "$DEPLOY_PATH"
              sudo chown "$(whoami)" "$DEPLOY_PATH"
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
